    <script>
      (function () {
        var search = window.location.search || "";
        var hash = window.location.hash || "";
        var ua = navigator.userAgent || "";
        var forceAll = /(?:^|[?&])haulzWebAppSdks=all(?:&|$)/.test(search);

        function needsTelegram() {
          if (forceAll) return true;
          if (/Telegram/i.test(ua)) return true;
          if (/tgWebAppData=/i.test(search) || /tgWebAppData=/i.test(hash)) return true;
          return false;
        }
        function needsMax() {
          if (forceAll) return true;
          if (/max[^a-z0-9]?app/i.test(ua)) return true;
          if (/WebAppData=/i.test(hash)) return true;
          return false;
        }
        function loadScript(src) {
          return new Promise(function (resolve, reject) {
            var s = document.createElement("script");
            s.src = src;
            s.async = false;
            s.onload = function () {
              resolve();
            };
            s.onerror = function () {
              reject(new Error("Failed to load " + src));
            };
            document.head.appendChild(s);
          });
        }
        var chain = Promise.resolve();
        if (needsTelegram()) {
          chain = chain
            .then(function () {
              return loadScript("https://telegram.org/js/telegram-web-app.js");
            })
            .catch(function (e) {
              console.warn("[HAULZ] telegram-web-app.js:", e && e.message ? e.message : e);
            });
        }
        if (needsMax()) {
          chain = chain
            .then(function () {
              return loadScript("https://st.max.ru/js/max-web-app.js");
            })
            .catch(function (e) {
              console.warn("[HAULZ] max-web-app.js:", e && e.message ? e.message : e);
            });
        }
        window.__haulzWebAppSdkReady = chain;
      })();
    </script>
