# HAULZ: nginx для поддомена API (Timeweb VPS).
#
# Сценарий A — прокси /api/* на Vercel (пока бэкенд serverless там).
# Позже можно заменить location /api/ на proxy_pass http://127.0.0.1:3000/ (свой Node).
#
# Установка на Ubuntu 24.04:
#   sudo apt install -y nginx
#   sudo cp (этот файл) /etc/nginx/sites-available/api.haulz.ru
#   sudo ln -sf /etc/nginx/sites-available/api.haulz.ru /etc/nginx/sites-enabled/
#   # отключить дефолтный сайт, если мешает default_server:
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Пока DNS не указывает на IP, проверка с вашего Mac:
#   curl -sS -D- "http://72.56.36.185/api/auth-config" -H "Host: api.haulz.ru"
# (подставьте IP сервера; ответ должен быть JSON, не HTML главной страницы.)
#
# После делегирования api.haulz.ru → этот IP:
#   sudo apt install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d api.haulz.ru
#   # certbot сам добавит listen 443 ssl и редирект с 80.

server {
    listen 80;
    listen [::]:80;
    server_name api.haulz.ru;

    client_max_body_size 50m;

    # Прокси на тот же хост, что в src/main.tsx (FALLBACK_API_ORIGIN / Vercel).
    location /api/ {
        proxy_pass https://mini-app-lake-phi.vercel.app;
        proxy_ssl_server_name on;
        proxy_set_header Host mini-app-lake-phi.vercel.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        return 404;
    }
}
